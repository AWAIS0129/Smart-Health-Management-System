{% extends "dashboard/index.html" %}

{% block dashboard_body %}
<div class="min-h-[80%] flex justify-center items-center py-8"> 
    <div class="w-[90%] max-w-4xl bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-green-300">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Select visualization mode</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex">
                <a href="{%url 'data_visualization:home'%}"
                class="w-full flex items-center justify-center bg-blue-500 hover:bg-blue-600 text-white font-semibold text-xl py-6 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                    one line chart
                </a>
            </div>
            
            <div class="flex">
                <a href="{%url 'data_visualization:cumulative_plot'%}"
                class="w-full flex items-center justify-center bg-green-500 hover:bg-green-600 text-white font-semibold text-xl py-6 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                    plot all data
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock dashboard_body %}
