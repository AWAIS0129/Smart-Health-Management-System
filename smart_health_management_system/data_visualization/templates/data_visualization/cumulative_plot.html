{% extends "dashboard/index.html" %}

{% block dashboard_body %}
<div id = "title" class="hidden">
    {% block chart_title %}{% endblock chart_title %}
</div>
<div class="min-h-[80%] flex justify-center items-center py-8 ">
    <div class="w-[90%] max-w-5xl bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-green-300">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">{% block chart_header %}{% endblock chart_header %} Visualization</h2>
        <canvas id="Chart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    
    const Context = {{ context|safe }};


    const Data_list = Context.map(item => JSON.parse(item.chart_data));

    const Canvas = document.getElementById('Chart').getContext('2d');
    const chart_title = document.getElementById('title').innerText;

    const chart = new Chart(Canvas, {
        type: 'line',
        data: {
           
            labels: Data_list[0].labels,

            datasets: [
                {
                    label: "Random Sugar",
                    data: Data_list[0].values,
                    borderColor: 'rgb(4, 243, 243)',
                    backgroundColor: 'rgba(75, 192, 192, 0.1)',
                    tension: 0.1,
                    borderWidth: 2,
                    fill: true
                },
                {
                    label: "Fasting Sugar",
                    data: Data_list[1].values,
                    borderColor: 'rgb(231, 6, 55)',
                    backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    tension: 0.1,
                    borderWidth: 2,
                    fill: true
                },
                {
                    label: "Weight",
                    data: Data_list[2].values,
                    borderColor: 'rgb(3, 150, 248)',
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    tension: 0.1,
                    borderWidth: 2,
                    fill: true
                },
                {
                    label: "Systolic BP",
                    data: Data_list[3].values,
                    borderColor: 'rgb(243, 176, 7)',
                    backgroundColor: 'rgba(255, 206, 86, 0.1)',
                    tension: 0.1,
                    borderWidth: 2,
                    fill: true
                },
                {
                    label: "Diastolic BP",
                    data: Data_list[4].values,
                    borderColor: 'rgb(85, 2, 250)',
                    backgroundColor: 'rgba(153, 102, 255, 0.1)',
                    tension: 0.1,
                    borderWidth: 2,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: chart_title + ' Over Time'
                },
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    title: { display: true }
                }
            }
        }
    });
</script>

{% endblock dashboard_body %}
