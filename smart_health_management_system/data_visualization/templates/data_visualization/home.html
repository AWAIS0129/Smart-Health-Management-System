{% extends "dashboard/index.html" %}


{% block dashboard_body %}
<div class="min-h-[80%] flex justify-center items-center py-8">
    <div class="w-[90%] max-w-5xl bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-green-300">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center capitalize">visualize your health data</h2>
        <p class="text-gray-600 text-center mb-8">Select a health parameter to visualize your health data</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
     
            <a href="{% url 'data_visualization:visualize_systolic_BP' %}"
               class="flex items-center justify-center bg-blue-500 hover:bg-blue-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Systolic BP
            </a>
            <a href="{% url 'data_visualization:visualize_diastolic_BP' %}"
               class="flex items-center justify-center bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Diastolic BP
            </a>
            
            <a href="{% url 'data_visualization:visualize_weight' %}"
               class="flex items-center justify-center bg-purple-500 hover:bg-purple-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Weight
            </a>
            
            <a href="{% url 'data_visualization:visualize_blood_sugar' %}"
               class="flex items-center justify-center bg-red-500 hover:bg-red-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Sugar
            </a>
            
            <a href="{% url 'data_visualization:visualize_temperature' %}"
               class="flex items-center justify-center bg-amber-500 hover:bg-amber-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Temp
            </a>
            
            <a href="{% url 'data_visualization:visualize_pulse' %}"
               class="flex items-center justify-center bg-pink-500 hover:bg-pink-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Pulse
            </a>
            
            <a href="{% url 'data_visualization:visualize_exercise' %}"
               class="flex items-center justify-center bg-orange-500 hover:bg-orange-600 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Exercise
            </a>
            
            <a href="{% url 'data_visualization:visualize_sleep' %}"
               class="flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                Sleep
            </a>

            
        
        </div>
    </div>
</div>

{% endblock dashboard_body %}
