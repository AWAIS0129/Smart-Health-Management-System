{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
    register - User Account Manager
{% endblock title %}

{% block body %}
<div class="min-h-screen flex justify-center items-center py-8 bg-gradient-to-br from-blue-50 to-indigo-50">
    <div class="w-[90%] max-w-md bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-blue-600">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Create Account</h2>
        <p class="text-gray-600 text-center mb-8">Register to start managing your health</p>
        
        <form method="POST">
            {% csrf_token %}
            {{form|crispy}}
            
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg mt-6">
                Register
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-gray-600 text-center">
                Already have an account? 
                <a href="{% url 'user_accounts:home' %}" class="text-blue-500 hover:text-blue-600 font-semibold">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock body %}
