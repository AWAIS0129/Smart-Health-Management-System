{% extends "dashboard/index.html" %}

{% block title %}
Health Reports
{% endblock title %}

{% block dashboard_body %}

<div class="min-h-[80%] flex justify-center items-center py-8">
    <div class="w-[90%] max-w-5xl bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-green-300">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Health Reports</h2>
        <p class="text-gray-600 text-center mb-8">Generate and download your personalized health report</p>
        
        <!-- Using anchor tags styled as buttons -->
        <div class="flex gap-4">
            <a href="{% url "report_engine:generate_report" %}" class="flex-1 px-6 py-3 bg-green-600 text-white text-center rounded-lg hover:bg-green-700 transition font-medium cursor-pointer">Generate PDF report</a>
            <a href="{% url "report_engine:export_csv" %}" class="flex-1 px-6 py-3 bg-blue-600 text-white text-center rounded-lg hover:bg-blue-700 transition font-medium cursor-pointer">Export CSV File</a>
        </div>
    </div>
</div>

{% endblock dashboard_body %}
