{% if messages %}
<div class="mb-6">
    {% for message in messages %}
    <div class="p-4 mb-3 rounded-lg flex items-start gap-3 {% if message.tags == 'success' %}bg-green-100 border border-green-400 text-green-800{% elif message.tags == 'error' %}bg-red-100 border border-red-400 text-red-800{% else %}bg-blue-100 border border-blue-400 text-blue-800{% endif %}"
         role="alert">
        <span class="text-lg">
            {% if message.tags == 'success' %}✓{% elif message.tags == 'error' %}✕{% else %}ℹ{% endif %}
        </span>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
