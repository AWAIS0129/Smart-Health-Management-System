{% if form.non_field_errors %}
<div class="mb-4 p-4 bg-red-100 border border-red-400 text-red-800 rounded-lg" role="alert">
    <p class="font-semibold">Form Error:</p>
    {% for error in form.non_field_errors %}
    <p>{{ error }}</p>
    {% endfor %}
</div>
{% endif %}

{% for field in form %}
    {% if field.errors %}
    <div class="mb-3 p-3 bg-red-50 border border-red-300 rounded-lg" role="alert">
        <p class="text-sm font-semibold text-red-800">{{ field.label }}: </p>
        {% for error in field.errors %}
        <p class="text-sm text-red-700">{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}
{% endfor %}
