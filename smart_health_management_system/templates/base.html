<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Health Management System - Track your health data">
    <meta name="theme-color" content="#2563eb">
    {% comment %} CSRF Token for secure form submissions {% endcomment %}
    <meta name="csrf-token" content="{{ csrf_token }}">
    
    <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
    
    <style>
        .pointer-events-none svg.fill-current.h-4.w-4 {
            width: 1rem !important;
            height: 1rem !important;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
    
    <title>SHMS - {% block title %}Smart Health Management System{% endblock title %}</title>
</head>
<body class="bg-white">
    {% block body %}
    {% endblock body %}
    
    <script>
        {# Security: Set CSRF token for AJAX requests #}
        const csrftoken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        
        {# Helper: Add CSRF token to AJAX headers #}
        function setCSRFHeader(xhr) {
            xhr.setRequestHeader("X-CSRFToken", csrftoken);
        }
    </script>
</body>
</html>
