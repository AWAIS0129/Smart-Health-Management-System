{% extends "dashboard/index.html" %}
{% block title %}Data entry mode{% endblock title %}

{% block dashboard_body %}
<div class="min-h-[80%] flex justify-center items-center py-8">
    <div class="w-[90%] max-w-2xl bg-white rounded-xl shadow-lg p-8 border-t-4 border-t-green-300">
        <h2 class="text-3xl font-bold text-gray-800 mb-4 text-center">Data Entry Mode</h2>
        <p class="text-gray-600 text-center mb-8">Please select how you want to enter health data</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="{%url 'health_data_manager:manual_health_data_entry'%}"
               class="flex items-center justify-center bg-blue-500 hover:bg-blue-600 text-white font-semibold text-lg py-6 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                Manual Data Entry
            </a>
            
            <a href="{%url 'health_data_manager:file_upload'%}"
               class="flex items-center justify-center bg-green-500 hover:bg-green-600 text-white font-semibold text-lg py-6 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                Upload File
            </a>
        </div>
    </div>
</div>
{% endblock dashboard_body %}
